name: dips
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  video_player: ^2.10.1
  go_router: ^17.0.1
  flutter_svg: ^2.2.3
  mobile_scanner: ^6.0.2
  permission_handler: ^11.3.0
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  get_it: ^9.2.1
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  flutter_otp_text_field: ^1.5.1+1
  flutter_otp_kit: ^3.1.1
  intl: ^0.20.2
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/video/
    - assets/image/
    - assets/icons/

fonts:
  - family: Poppins
    fonts:
      - asset: fonts/Poppins-Thin.ttf
        weight: 100
      - asset: fonts/Poppins-ThinItalic.ttf
        weight: 100
        style: italic
      - asset: fonts/Poppins-ExtraLight.ttf
        weight: 200
      - asset: fonts/Poppins-ExtraLightItalic.ttf
        weight: 200
        style: italic
      - asset: fonts/Poppins-Light.ttf
        weight: 300
      - asset: fonts/Poppins-LightItalic.ttf
        weight: 300
        style: italic
      - asset: fonts/Poppins-Regular.ttf
        weight: 400
      - asset: fonts/Poppins-Italic.ttf
        weight: 400
        style: italic
      - asset: fonts/Poppins-Medium.ttf
        weight: 500
      - asset: fonts/Poppins-MediumItalic.ttf
        weight: 500
        style: italic
      - asset: fonts/Poppins-SemiBold.ttf
        weight: 600
      - asset: fonts/Poppins-SemiBoldItalic.ttf
        weight: 600
        style: italic
      - asset: fonts/Poppins-Bold.ttf
        weight: 700
      - asset: fonts/Poppins-BoldItalic.ttf
        weight: 700
        style: italic
      - asset: fonts/Poppins-ExtraBold.ttf
        weight: 800
      - asset: fonts/Poppins-ExtraBoldItalic.ttf
        weight: 800
        style: italic
      - asset: fonts/Poppins-Black.ttf
        weight: 900
      - asset: fonts/Poppins-BlackItalic.ttf
        weight: 900
        style: italic
